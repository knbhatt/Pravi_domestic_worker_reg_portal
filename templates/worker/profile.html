{% extends 'base.html' %}
{% block title %}Personal Details{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-6">
        <h5 class="fw-bold mb-4"><i class="bi bi-person-lines-fill me-2"></i>Personal Details</h5>
        <div class="card p-4">
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Full Name *</label>
                    <input type="text" name="full_name" class="form-control" value="{{ worker.full_name }}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Date of Birth *</label>
                    <input type="date" name="date_of_birth" class="form-control" value="{{ worker.date_of_birth }}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Gender *</label>
                    <select name="gender" class="form-select" required>
                        <option value="">Select gender</option>
                        <option value="M" {% if worker.gender == 'M' %}selected{% endif %}>Male</option>
                        <option value="F" {% if worker.gender == 'F' %}selected{% endif %}>Female</option>
                        <option value="Other" {% if worker.gender == 'Other' %}selected{% endif %}>Other</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Address *</label>
                    <textarea name="address" class="form-control" rows="2" required>{{ worker.address }}</textarea>
                </div>
                <div class="row">
                    <div class="col-6 mb-3">
                        <label class="form-label">City</label>
                        <input type="text" name="city" class="form-control" value="{{ worker.city }}">
                    </div>
                    <div class="col-6 mb-3">
                        <label class="form-label">Pincode</label>
                        <input type="text" name="pincode" class="form-control" maxlength="6" value="{{ worker.pincode }}">
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">State</label>
                    <input type="text" name="state" class="form-control" value="{{ worker.state }}">
                </div>
                <button type="submit" class="btn btn-primary w-100 py-3">
                    <i class="bi bi-save me-2"></i>Save & Continue
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
